; Dev-friendly overrides applied to every PHP version.
memory_limit = 512M
upload_max_filesize = 128M
post_max_size = 128M
max_execution_time = 600
max_input_vars = 5000

; Show errors in dev (turn off for prod-like testing)
display_errors = On
display_startup_errors = On
error_reporting = E_ALL

; Opcache: revalidate quickly so code edits show immediately
opcache.enable = 1
opcache.revalidate_freq = 0
opcache.validate_timestamps = 1

; Xdebug installed but OFF by default (no perf hit).
; To debug: set mode = debug and connect your IDE to host.docker.internal:9003
xdebug.mode = off
xdebug.client_host = host.docker.internal
xdebug.client_port = 9003
xdebug.start_with_request = yes
