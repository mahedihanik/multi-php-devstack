# ===== PHP 84 =====

# HTTP -> redirect to HTTPS  (<project>.84.test)
server {
    listen 80;
    server_name ~^(?<sitename>.+)\.84\.test$;
    return 301 https://$host$request_uri;
}

# HTTPS -> serve  (<project>.84.test)
server {
    listen 443 ssl;
    server_name ~^(?<sitename>.+)\.84\.test$;

    ssl_certificate     /etc/nginx/certs/devstack.pem;
    ssl_certificate_key /etc/nginx/certs/devstack-key.pem;

    # For Laravel/Symfony change to: /var/www/html/$sitename/public
    root /var/www/html/$sitename;
    index index.php index.html;

    location / { try_files $uri $uri/ /index.php?$query_string; }

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass php84:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_param HTTPS $https if_not_empty;
    }
}

# No-config fallback (plain HTTP, no redirect):  http://localhost:8084/<project>/
server {
    listen 8084;
    server_name localhost;
    root /var/www/html;
    autoindex on;
    index index.php index.html;

    location / { try_files $uri $uri/ =404; }

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass php84:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }
}
